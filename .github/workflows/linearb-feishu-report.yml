name: LinearB AI Review вҶ’ Feishu

# LinearB зҡ„ AI д»Јз ҒиҜ„е®ЎеңЁ GitHub дёҠд»Ҙ check_run `lb/linearb_ai_review` зҡ„еҪўејҸеҮәзҺ°гҖӮ
# иҜҘ check дёҖе®ҢжҲҗе°ұи§ҰеҸ‘жң¬ workflow вҶ’ и§ЈжһҗиҜ„е®Ўз»“и®ә вҶ’ жҺЁдёҖеј жҠҘе‘ҠеҚЎзүҮеҲ°йЈһд№ҰгҖӮ
#
# еҸӘеӨ„зҗҶгҖҢPR еҗҲе№¶еҲ° mainгҖҚзҡ„иҜ„е®Ўпјҡbase еҲҶж”Ҝеҝ…йЎ»жҳҜ mainпјҢеҗҰеҲҷи·іиҝҮгҖӮ
# з»“и®әдәҢе…ғеҢ–пјҲе·ІеҺ»жҺүиҜ„еҲҶпјүпјҡ
#   - жӯЈж–Үеҗ« `LGTM` дё”ж— й—®йўҳеқ—            вҶ’ вң… йҖҡиҝҮпјҲж— зјәйҷ·пјү
#   - еҗ« `N issues detected` / й—®йўҳеқ—      вҶ’ вқҢ дёҚйҖҡиҝҮпјҲеҲ—еҮәзјәйҷ·пјү
#   - `Review timed outвҖҰ`пјҲзі»з»ҹиҝҮиҪҪжІЎи·‘е®ҢпјүвҶ’ дёҚеҸ‘пјҲиҜ„е®ЎжІЎеҮәзңҹз»“жһңпјҢйҒҝе…ҚиҜҜжҠҘгҖҢ0 дёӘй—®йўҳд№ҹдёҚйҖҡиҝҮгҖҚпјү
#
# йҖ»иҫ‘дёҺ scripts/linearb/report.js дҝқжҢҒдёҖиҮҙпјҲйӮЈд»ҪжҳҜе”ҜдёҖзңҹжәҗ + жң¬ең°жөӢиҜ•е…ҘеҸЈпјүгҖӮ

on:
  check_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  report:
    # еҸӘеӨ„зҗҶ LinearB AI иҜ„е®ЎиҝҷдёҖдёӘ checkпјҢйҒҝе…ҚйҮҚеӨҚжҺЁйҖҒ
    if: >-
      github.event.check_run.name == 'lb/linearb_ai_review' &&
      github.repository_owner == 'zettlab'
    runs-on: ubuntu-latest
    steps:
      - name: Parse LinearB review and notify Feishu
        uses: actions/github-script@v8
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.LINEARB_FEISHU_WEBHOOK }}
        with:
          script: |
            const hook = process.env.FEISHU_WEBHOOK_URL;
            if (!hook) { core.setFailed('зјәе°‘ secret LINEARB_FEISHU_WEBHOOK'); return; }
            const cr = context.payload.check_run;
            const summary = (cr.output && cr.output.summary) || '';

            // в”Җв”Җ еҲӨе®ҡпјҡpass / fail / skipпјҲдёҺ scripts/linearb/report.js еҗҢжӯҘпјүв”Җв”Җ
            function classifyReview(body) {
              body = body || '';
              const issues = [];
              const re = /<summary><strong>([\s\S]*?)<\/strong><\/summary>/g;
              let mm;
              while ((mm = re.exec(body)) !== null) {
                const raw = mm[1].replace(/<kbd>[\s\S]*?<\/kbd>/g, '').replace(/<[^>]+>/g, '').trim();
                const dash = raw.indexOf(' - ');
                const cat = (dash > 0 ? raw.slice(0, dash) : raw).trim();
                const title = (dash > 0 ? raw.slice(dash + 3) : '').trim();
                issues.push({ cat, title });
              }
              const dm = body.match(/\*\*(\d+)\s+issues?\s+detected/i);
              const declared = dm ? parseInt(dm[1], 10) : 0;
              const count = issues.length || declared;
              if (count > 0) return { verdict: 'fail', issues, count };
              if (/\bLGTM\b/.test(body)) return { verdict: 'pass', issues: [], count: 0 };
              return { verdict: 'skip', issues: [], count: 0 };
            }

            const cls = classifyReview(summary);
            if (cls.verdict === 'skip') { core.info('иҜ„е®ЎжңӘеҮәзңҹз»“жһңпјҲи¶…ж—¶/дёҚеҸҜеҲӨе®ҡпјүпјҢи·іиҝҮ'); return; }

            // в”Җв”Җ е®ҡдҪҚ PRпјҲдҪңиҖ… / й“ҫжҺҘ / ж Үйўҳ / еҲҶж”Ҝпјүв”Җв”Җ
            let pr = (cr.pull_requests && cr.pull_requests[0]) || null;
            let prTitle = '', author = '', prUrl = '', baseRef = '', headRef = '', prNum = 0;
            try {
              if (!pr) {
                const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit(
                  { owner: context.repo.owner, repo: context.repo.repo, commit_sha: cr.head_sha });
                pr = data && data[0];
              }
              if (pr) {
                prNum = pr.number;
                const { data: full } = await github.rest.pulls.get(
                  { owner: context.repo.owner, repo: context.repo.repo, pull_number: prNum });
                prTitle = full.title; author = full.user.login; prUrl = full.html_url;
                baseRef = full.base.ref; headRef = full.head.ref;
              }
            } catch (e) { core.warning('еҸ– PR еӨұиҙҘ: ' + e.message); }
            if (!prUrl) { core.info('иҜҘ check жңӘе…іиҒ” PRпјҢи·іиҝҮ'); return; }

            // еҸӘжҠҘгҖҢеҗҲе№¶еҲ° mainгҖҚзҡ„ PR
            if (baseRef !== 'main') { core.info(`base=${baseRef} йқһ mainпјҢи·іиҝҮ`); return; }

            // в”Җв”Җ з»„йЈһд№ҰеҚЎзүҮпјҲж— иҜ„еҲҶпјүв”Җв”Җ
            const ok = cls.verdict === 'pass';
            const head = ok ? 'вң… LinearB иҜ„е®ЎйҖҡиҝҮ' : `вқҢ LinearB иҜ„е®ЎдёҚйҖҡиҝҮ вҖ” еҸ‘зҺ° ${cls.count} дёӘзјәйҷ·`;
            const lines = [
              `**д»“еә“**пјҡ${context.repo.repo}`,
              `**PR**пјҡ[#${prNum} ${prTitle}](${prUrl})`,
              `**жҸҗдәӨиҖ…**пјҡ${author}`,
              `**еҲҶж”Ҝ**пјҡ${baseRef} вҶҗ ${headRef}`,
              `**з»“и®ә**пјҡ${ok ? 'вң… йҖҡиҝҮпјҲж— зјәйҷ·пјү' : `вқҢ дёҚйҖҡиҝҮпјҲ${cls.count} дёӘзјәйҷ·пјү`}`,
            ];
            if (!ok && cls.issues.length) {
              lines.push('\n**зјәйҷ·жё…еҚ•**пјҡ');
              cls.issues.forEach((it, i) => lines.push(`${i + 1}. ${it.cat}${it.title ? ' вҖ” ' + it.title : ''}`));
            }
            const card = {
              msg_type: 'interactive',
              card: {
                config: { wide_screen_mode: true },
                header: { template: ok ? 'green' : 'red', title: { tag: 'plain_text', content: head } },
                elements: [
                  { tag: 'div', text: { tag: 'lark_md', content: lines.join('\n') } },
                  { tag: 'hr' },
                  { tag: 'note', elements: [{ tag: 'plain_text', content: 'LinearB AI Review В· PR вҶ’ main В· check_run иҮӘеҠЁи§ҰеҸ‘' }] },
                  { tag: 'action', elements: [{ tag: 'button', text: { tag: 'plain_text', content: 'жү“ејҖ PR' }, type: 'primary', url: prUrl }] },
                ],
              },
            };
            const resp = await fetch(hook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(card) });
            core.info('Feishu: ' + (await resp.text()));
