name: LinearB AI Review → Feishu

# LinearB 的 AI 代码评审在 GitHub 上以 check_run `lb/linearb_ai_review` 的形式出现。
# 该 check 一完成就触发本 workflow，解析评审结论 → 推一张报告卡片到飞书。
# 评审本身是 COMMENTED 模式(conclusion 恒为 success)，所以"通过/不通过"按评审正文判：
#   - "LGTM"            → ✅ 通过
#   - "N issues detected" → ❌ 不通过（按问题数×严重度算 0-100 评分）

on:
  check_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  report:
    # 只处理 LinearB AI 评审这一个 check，避免重复推送
    if: >-
      github.event.check_run.name == 'lb/linearb_ai_review' &&
      github.repository_owner == 'zettlab'
    runs-on: ubuntu-latest
    steps:
      - name: Parse LinearB review and notify Feishu
        uses: actions/github-script@v8
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.LINEARB_FEISHU_WEBHOOK }}
        with:
          script: |
            const hook = process.env.FEISHU_WEBHOOK_URL;
            if (!hook) { core.setFailed('缺少 secret LINEARB_FEISHU_WEBHOOK'); return; }
            const cr = context.payload.check_run;
            const summary = (cr.output && cr.output.summary) || '';

            // ── 解析评审 ──
            function parseReview(body) {
              const m = body.match(/\*\*(\d+)\s+issues?\s+detected/i);
              const declared = m ? parseInt(m[1], 10) : 0;
              const issues = [];
              const re = /<summary><strong>(.*?)<\/strong><\/summary>/gs;
              let mm;
              while ((mm = re.exec(body)) !== null) {
                const raw = mm[1].replace(/<kbd>.*?<\/kbd>/g, '').replace(/<[^>]+>/g, '').trim();
                const dash = raw.indexOf(' - ');
                const cat = (dash > 0 ? raw.slice(0, dash) : raw).trim();
                const title = (dash > 0 ? raw.slice(dash + 3) : '').trim();
                issues.push({ cat, title });
              }
              const count = issues.length || declared;
              const pass = !count && /LGTM/.test(body);
              const weight = (c) => /security|🔒/i.test(c) ? 30 : /bug|🐞/i.test(c) ? 20 : /perf|🚀/i.test(c) ? 15 : 10;
              let score = pass ? 100 : Math.max(0, 100 - issues.reduce((s, i) => s + weight(i.cat), 0));
              if (!pass && issues.length === 0 && count > 0) score = Math.max(0, 100 - count * 20);
              return { pass, count, issues, score };
            }
            const grade = (s) => s >= 90 ? 'A · 优秀' : s >= 75 ? 'B · 良好' : s >= 60 ? 'C · 需改进' : s >= 40 ? 'D · 较差' : 'E · 高风险';

            const review = parseReview(summary);

            // ── 定位 PR（作者 / 链接 / 标题）──
            let pr = (cr.pull_requests && cr.pull_requests[0]) || null;
            let prTitle = '', author = '', prUrl = '', baseRef = '', headRef = '';
            try {
              if (!pr) {
                const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit(
                  { owner: context.repo.owner, repo: context.repo.repo, commit_sha: cr.head_sha });
                pr = data && data[0];
              }
              if (pr) {
                const num = pr.number;
                const { data: full } = await github.rest.pulls.get(
                  { owner: context.repo.owner, repo: context.repo.repo, pull_number: num });
                prTitle = full.title; author = full.user.login; prUrl = full.html_url;
                baseRef = full.base.ref; headRef = full.head.ref;
              }
            } catch (e) { core.warning('取 PR 失败: ' + e.message); }
            if (!prUrl) { core.info('该 check 未关联 PR，跳过'); return; }

            // ── 组飞书卡片 ──
            const ok = review.pass;
            const head = ok ? '✅ LinearB 评审通过' : `❌ LinearB 评审不通过 — 发现 ${review.count} 个问题`;
            const lines = [
              `**仓库**：${context.repo.repo}`,
              `**PR**：[#${pr.number} ${prTitle}](${prUrl})`,
              `**提交者**：${author}`,
              `**分支**：${baseRef} ← ${headRef}`,
              `**结论**：${ok ? '✅ 通过 (LGTM)' : '❌ 不通过'}`,
              `**代码整体评分**：${review.score}/100 · ${grade(review.score)}`,
            ];
            if (!ok && review.issues.length) {
              lines.push('\n**问题清单**：');
              review.issues.forEach((it, i) => lines.push(`${i + 1}. ${it.cat} — ${it.title}`));
            }
            const card = {
              msg_type: 'interactive',
              card: {
                config: { wide_screen_mode: true },
                header: { template: ok ? 'green' : 'red', title: { tag: 'plain_text', content: head } },
                elements: [
                  { tag: 'div', text: { tag: 'lark_md', content: lines.join('\n') } },
                  { tag: 'hr' },
                  { tag: 'note', elements: [{ tag: 'plain_text', content: 'LinearB AI Review · check_run 自动触发 · 评分按问题数×严重度推导' }] },
                  { tag: 'action', elements: [{ tag: 'button', text: { tag: 'plain_text', content: '打开 PR' }, type: 'primary', url: prUrl }] },
                ],
              },
            };
            const resp = await fetch(hook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(card) });
            core.info('Feishu: ' + (await resp.text()));
