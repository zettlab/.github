name: ci
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject local replace directives for zettlab modules
        # RFC-0001 §A2: depend on tagged versions only. A `replace`
        # directive pointing at a local path or another zettlab module
        # is a local-edit convenience (see Part 5 of the onboarding
        # doc) and must never reach main. This check is intentionally
        # strict — no escape-hatch comment — because one false positive
        # is one PR discussion; one accidental merge breaks every
        # downstream `go mod download`.
        run: |
          if grep -nE "^replace[[:space:]]+github\.com/zettlab/" go.mod; then
            echo "::error file=go.mod::go.mod contains a 'replace' directive pointing at a zettlab module."
            echo "::error::Remove with: go mod edit -dropreplace <module> && go mod tidy"
            echo "::error::See https://github.com/zettlab/zettlab-product-dev/blob/main/docs/getting-started-go-shared-libs.md (Part 5) for the local-edit workflow."
            exit 1
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 -timeout 5m ./...
      - name: go mod tidy is no-op
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        run: |
          tag="${GITHUB_REF_NAME}"
          prev=$(git tag --sort=-v:refname | grep -v "^${tag}$" | head -1 || echo "")
          if [ -z "$prev" ]; then
            range="HEAD"
            echo "## ${tag} (initial release)" > notes.md
          else
            range="${prev}..HEAD"
            echo "## ${tag}" > notes.md
            echo "" >> notes.md
            echo "Changes since ${prev}:" >> notes.md
          fi
          echo "" >> notes.md
          git log --pretty=format:'- %s (%h)' "${range}" >> notes.md
          cat notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
